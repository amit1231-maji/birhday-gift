<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories 💕</title>
    <link rel="stylesheet" href="gallay.css">
</head>
<body>

  <div class="floating-hearts" id="floating-hearts"></div>

  <div class="gallery-box">

    <div class="gallery-top">
      <div class="rose">🌹</div>
      <h1 class="gallery-title">caption </h1>
    </div>

    <div class="slideshow">

      <div class="slide active">
        <img src=" pic.jpg" alt="Memory 1">
        <div class="caption">caption 💕</div>
      </div>

      <div class="slide">
        <img src="pic.jpg" alt="Memory 2">
        <div class="caption">caption 💕</div>
      </div>

      <div class="slide">
        <img src="pic.jpg" alt="Memory 3">
        <div class="caption">caption 💕</div>
      </div>

      <div class="slide">
        <img src="pic.jpg" alt="Memory 4">
        <div class="caption">caption 💕</div>
      </div>

      <div class="slide">
        <img src="pic.jpg" alt="Memory 5">
        <div class="caption">caption 💕</div>
      </div>

      <div class="slide">
        <img src="pic.jpg" alt="Memory 6">
        <div class="caption">caption 💕</div>
      </div>

      <div class="slide">
        <img src="pic.jpg" alt="Memory 7">
        <div class="caption">caption 💕</div>
      </div>

      <div class="slide">
        <img src="pic.jpg" alt="Memory 8">
        <div class="caption">caption 💕</div>
      </div>

      <div class="slide">
        <img src="pic.jpg" alt="Memory 9">
        <div class="caption">caption 💕</div>
      </div>


      <div class="slide">
        <img src="pic.jpg" alt="Memory 11">
        <div class="caption">caption</div>
      </div>

    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="changeSlide(-1)">❮</button>
      <div class="dots" id="dots"></div>
      <button class="ctrl-btn" onclick="changeSlide(1)">❯</button>
    </div>

  </div>

  <script src="/gallary.js"></script>
</body>
</html>
